spring:
  application:
    name: incidents-api

  datasource:
    url: jdbc:postgresql://localhost:5432/incidents_db
    username: incidents_user
    password: incidents_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080